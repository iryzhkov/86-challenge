{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>86 Challenge Telemetry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .lap-valid { }
        .lap-invalid { opacity: 0.5; }
        .lap-best { background-color: #ecfdf5; } /* green - session best */
        .lap-best td:nth-child(2) { color: #15803d; font-weight: 700; }
        .lap-pb { background-color: #f5f3ff; } /* purple - track PB */
        .lap-pb td:nth-child(2) { color: #7c3aed; font-weight: 700; }
        .lap-selected { background-color: #eff6ff !important; } /* blue - currently viewing */
        .split-pb { color: #7c3aed; font-weight: 700; } /* purple bold - track PB split */
        .split-event { color: #15803d; font-weight: 600; } /* green - event best split */
        .leaflet-pane, .leaflet-top, .leaflet-bottom,
        .leaflet-control { z-index: 30 !important; }
        .turn-label { background: none !important; border: none !important; box-shadow: none !important;
            font-weight: 700; font-size: 11px; color: #1f2937; }
        /* Mobile: horizontal scroll for tables */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-wrap table { min-width: 600px; }
        /* Mobile: stack grids */
        @media (max-width: 640px) {
            .grid-cols-2 { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gray-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight whitespace-nowrap">
                <span class="text-red-500">86</span> Challenge
            </a>
            <!-- Desktop nav -->
            <div class="hidden md:flex gap-6 text-sm">
                <a href="/" class="hover:text-red-400">Home</a>
                <a href="/upload" class="hover:text-red-400">Upload</a>
                <a href="/events" class="hover:text-red-400">Events</a>
                <a href="/sessions" class="hover:text-red-400">Sessions</a>
                <a href="/drivers" class="hover:text-red-400">Drivers</a>
                <a href="/leaderboard" class="hover:text-red-400">Leaderboard</a>
            </div>
            <!-- Mobile hamburger -->
            <button class="md:hidden text-white" onclick="document.getElementById('mobile-nav').classList.toggle('hidden')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-nav" class="hidden md:hidden border-t border-gray-700 px-4 py-2 space-y-2 text-sm">
            <a href="/" class="block py-1 hover:text-red-400">Home</a>
            <a href="/upload" class="block py-1 hover:text-red-400">Upload</a>
            <a href="/events" class="block py-1 hover:text-red-400">Events</a>
            <a href="/sessions" class="block py-1 hover:text-red-400">Sessions</a>
            <a href="/leaderboard" class="block py-1 hover:text-red-400">Leaderboard</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {{template "content" .}}
    </main>
    <!-- Compare bar (global, persisted via sessionStorage) -->
    <div id="compare-bar" class="hidden fixed bottom-0 left-0 right-0 bg-gray-900 text-white p-3 flex items-center justify-between z-50">
        <span id="compare-count">0 laps selected</span>
        <div>
            <button onclick="clearCompare()" class="text-gray-400 hover:text-white mr-4 text-sm">Clear</button>
            <a id="compare-link" href="/compare" class="bg-red-600 px-4 py-2 rounded hover:bg-red-700">Compare Laps</a>
        </div>
    </div>

    <script>
    // Global compare selection — persisted in sessionStorage
    // Stores {trackId, laps: [lapId, ...]} to enforce same-track comparison
    let compareData = JSON.parse(sessionStorage.getItem('compareData') || '{"trackId":0,"laps":[]}');
    let compareSet = new Set(compareData.laps);

    function addToCompare(lapId, trackId) {
        trackId = trackId || 0;
        // If adding from a different track, clear the old list
        if (compareData.trackId && trackId && compareData.trackId !== trackId) {
            compareSet.clear();
            compareData.trackId = trackId;
        }
        if (!compareData.trackId && trackId) compareData.trackId = trackId;

        if (compareSet.has(lapId)) {
            compareSet.delete(lapId);
        } else {
            compareSet.add(lapId);
        }
        if (compareSet.size === 0) compareData.trackId = 0;
        saveCompare();
        updateCompareBar();
    }
    function clearCompare() {
        compareSet.clear();
        compareData = {trackId: 0, laps: []};
        saveCompare();
        updateCompareBar();
    }
    function saveCompare() {
        compareData.laps = [...compareSet];
        sessionStorage.setItem('compareData', JSON.stringify(compareData));
    }
    function updateCompareBar() {
        const bar = document.getElementById('compare-bar');
        const count = document.getElementById('compare-count');
        const link = document.getElementById('compare-link');
        if (compareSet.size > 0) {
            bar.classList.remove('hidden');
            count.textContent = compareSet.size + ' lap' + (compareSet.size > 1 ? 's' : '') + ' selected';
            link.href = '/compare?laps=' + [...compareSet].join(',');
        } else {
            bar.classList.add('hidden');
        }
        // Update any compare buttons on the page
        document.querySelectorAll('[data-compare-lap]').forEach(btn => {
            const id = parseInt(btn.dataset.compareLap);
            btn.textContent = compareSet.has(id) ? 'Remove' : 'Compare';
            btn.classList.toggle('text-red-600', compareSet.has(id));
            btn.classList.toggle('text-blue-600', !compareSet.has(id));
        });
    }
    // Initialize on page load
    updateCompareBar();
    </script>

    <footer class="text-center text-gray-400 text-xs py-4 mt-8 mb-12">
        86 Challenge Telemetry &mdash; GR86 / BRZ / FR-S Time Trial Community
    </footer>
</body>
</html>
{{end}}
