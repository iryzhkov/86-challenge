services:
  app:
    build: .
    container_name: 86-challenge
    ports:
      - "8086:8086"
    environment:
      - DATABASE_URL=postgres://challenge:${DB_PASSWORD:-changeme}@db:5432/challenge?sslmode=disable
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - PORT=8086
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: 86-challenge-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=challenge
      - POSTGRES_USER=challenge
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U challenge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
